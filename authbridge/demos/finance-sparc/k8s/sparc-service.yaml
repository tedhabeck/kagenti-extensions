# SPARC reflection service for the demo, deployed into kagenti-system.
# Its config (provider/model/track) is supplied by the `sparc-service-config`
# ConfigMap and the optional `sparc-watsonx` Secret, both created by the
# Makefile (provider-aware: watsonx or ollama). In production this ships via the
# kagenti Helm chart (components.sparcService.enabled=true).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sparc-service
  namespace: kagenti-system
  labels:
    app.kubernetes.io/name: sparc-service
    app.kubernetes.io/part-of: finance-sparc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sparc-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sparc-service
        app.kubernetes.io/part-of: finance-sparc-demo
        kagenti.io/inject: disabled
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sparc-service
          image: sparc-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          envFrom:
            - configMapRef:
                name: sparc-service-config
            - secretRef:
                name: sparc-watsonx
                optional: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sparc-service
  namespace: kagenti-system
  labels:
    app.kubernetes.io/name: sparc-service
    app.kubernetes.io/part-of: finance-sparc-demo
spec:
  selector:
    app.kubernetes.io/name: sparc-service
  ports:
    - port: 8090
      targetPort: http
      name: http
