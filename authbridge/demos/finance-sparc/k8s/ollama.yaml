# In-cluster Ollama for the demo — provides the agent's reasoning LLM on the
# watsonx path WITHOUT depending on host networking. The model is staged onto
# the kind node at /opt/ollama-models (by scripts/stage-ollama-model.sh) and
# mounted here, so no large pull is needed. (The PROVIDER=ollama path uses the
# host Ollama instead and doesn't deploy this workload.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: team1
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: finance-sparc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/part-of: finance-sparc-demo
        kagenti.io/inject: disabled
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ollama
          image: ollama/ollama:0.30.2
          imagePullPolicy: IfNotPresent
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "24h"
            # Run as a non-root uid: keep HOME (keys/history) on a writable
            # emptyDir and read the staged models from the mounted hostPath.
            - name: HOME
              value: /home/ollama
            - name: OLLAMA_MODELS
              value: /models
          ports:
            - containerPort: 11434
              name: http
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: home
              mountPath: /home/ollama
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              memory: 8Gi
      volumes:
        - name: models
          hostPath:
            path: /opt/ollama-models
            type: Directory
        - name: home
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: team1
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: finance-sparc-demo
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - port: 11434
      targetPort: http
      name: http
