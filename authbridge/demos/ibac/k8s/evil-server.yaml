# Exfiltration target for the IBAC demo.
#
# Logs whatever the compromised tool-call loop POSTs at it. With IBAC
# enabled, this Pod's logs stay empty — the request is denied at the
# agent's authbridge sidecar before it ever leaves the agent's pod.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibac-evil-server
  namespace: team1
  labels:
    app.kubernetes.io/name: ibac-evil-server
    app.kubernetes.io/part-of: ibac-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ibac-evil-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibac-evil-server
        app.kubernetes.io/part-of: ibac-demo
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: evil-server
          image: ibac-evil-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9999
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ibac-evil-server
  namespace: team1
spec:
  selector:
    app.kubernetes.io/name: ibac-evil-server
  ports:
    - port: 9999
      targetPort: 9999
      protocol: TCP
  type: ClusterIP
