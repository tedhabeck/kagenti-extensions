# Poisoned email server for the IBAC demo.
#
# Returns 6 emails on GET /emails — the last one contains a prompt
# injection that tells the agent to POST to evil-server. Plain HTTP
# service in team1; not labelled as a kagenti agent or tool, so the
# operator's webhook leaves it alone.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibac-email-server
  namespace: team1
  labels:
    app.kubernetes.io/name: ibac-email-server
    app.kubernetes.io/part-of: ibac-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ibac-email-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibac-email-server
        app.kubernetes.io/part-of: ibac-demo
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: email-server
          image: ibac-email-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
          env:
            - name: EXFIL_URL
              value: "http://ibac-evil-server.team1.svc.cluster.local:9999"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ibac-email-server
  namespace: team1
spec:
  selector:
    app.kubernetes.io/name: ibac-email-server
  ports:
    - port: 8888
      targetPort: 8888
      protocol: TCP
  type: ClusterIP
