# IBAC demo email-assistant agent — fully self-contained.
#
# The authbridge sidecar mounts ibac-agent-config (config.yaml). This
# ConfigMap is created on demand by the Makefile from one of the two
# files under k8s/configs/:
#
#   k8s/configs/no-ibac.yaml — a2a-parser inbound, mcp-parser outbound.
#                              NO ibac plugin. Baseline (exfil succeeds).
#   k8s/configs/ibac.yaml    — same plus ibac in the outbound chain.
#                              Judge denies misaligned outbound.
#
# `make deploy` creates the ConfigMap from no-ibac.yaml as the initial
# state; `make demo-ibac` / `make demo-no-ibac` rewrite it via
# `kubectl create configmap --from-file --dry-run | kubectl apply`.
# Authbridge's filesystem-watch hot-reload picks up the change without
# a pod restart.
#
# This manifest does NOT depend on the kagenti operator. The
# authbridge sidecar is declared inline so the demo runs against any
# kind / minikube cluster after `make deploy`. The image references
# `authbridge:demo` — see Makefile for build instructions; the demo
# does NOT pull a published authbridge image because it must include
# the IBAC plugin from this branch.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ibac-agent
  namespace: ibac-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibac-agent
  namespace: ibac-demo
  labels:
    app.kubernetes.io/name: ibac-agent
    app.kubernetes.io/part-of: ibac-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ibac-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibac-agent
    spec:
      serviceAccountName: ibac-agent
      # Distroless nonroot images set runAsUser implicitly, but a
      # security-themed demo deserves an explicit policy so readers
      # can copy the snippet verbatim.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # ----- Agent (the email assistant with vulnerable tools) -----
        - name: agent
          image: ibac-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # All outbound HTTP from the agent flows through the
            # authbridge forward proxy. Go's default transport honors
            # this env var (see agent/main.go:execHTTPPost).
            - name: HTTP_PROXY
              value: "http://localhost:8081"
            # PORT mismatch is intentional: the agent listens on 8000;
            # authbridge's reverse proxy listens on 8080 and forwards
            # to localhost:8000 (see ConfigMap reverse_proxy_backend).
            # Inbound clients hit the Service on 8080 → sidecar → 8000.
            - name: PORT
              value: "8000"
            - name: OLLAMA_URL
              value: "http://host.docker.internal:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:3b"
            - name: EMAIL_URL
              value: "http://ibac-email-server.ibac-demo.svc.cluster.local:8888"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi

        # ----- AuthBridge sidecar (proxy-sidecar mode) -----
        - name: authbridge
          # NB: this image must contain the IBAC plugin. Until a
          # release tag ships, build locally from this branch:
          #   cd ../../.. && podman build \
          #     -f authbridge/cmd/authbridge-proxy/Dockerfile \
          #     -t authbridge:demo authbridge/
          #   kind load docker-image authbridge:demo --name kagenti
          image: authbridge:demo
          imagePullPolicy: IfNotPresent
          # The entrypoint forwards args to the authbridge-proxy
          # binary, which requires --config. The operator's injection
          # path sets this automatically; we set it explicitly here.
          args:
            - "--config"
            - "/etc/authbridge/config.yaml"
          ports:
            - containerPort: 8080
              name: reverse-proxy
            - containerPort: 8081
              name: forward-proxy
            - containerPort: 9094
              name: session-api
          env:
            # Disable SPIRE — the demo doesn't need workload identity.
            - name: SPIRE_ENABLED
              value: "false"
            - name: LOG_LEVEL
              value: "INFO"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/authbridge
              readOnly: true
            # Writable /tmp for the alpine-based authbridge image.
            # The binary itself doesn't write here, but with
            # readOnlyRootFilesystem some shell / TLS-cert temp use
            # would otherwise EROFS. Costs nothing to provide.
            - name: tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi

      volumes:
        - name: config
          configMap:
            name: ibac-agent-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ibac-agent
  namespace: ibac-demo
spec:
  selector:
    app.kubernetes.io/name: ibac-agent
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9094
      targetPort: 9094
      protocol: TCP
      name: session-api
  type: ClusterIP
