# IBAC plugin-pipeline patch fragment.
#
# This file is NOT a Kubernetes manifest. It's a YAML doc holding the
# additions scripts/patch-ibac-config.sh merges into the operator-
# rendered authbridge ConfigMap (`authbridge-config-email-agent` in
# team1).
#
# The script:
#   1. kubectl get cm authbridge-config-email-agent -o jsonpath
#      '{.data.config\.yaml}' to extract the operator's full config
#   2. parses it with python3 (PyYAML in stdlib? no — uses ruamel-style
#      string-edit; see patch-ibac-config.sh)
#   3. merges these additions:
#        - prepend `a2a-parser` to pipeline.inbound.plugins
#          (it must run BEFORE jwt-validation so the parsed message
#           is available even if jwt-validation rejects)
#        - append `mcp-parser` then `ibac` to pipeline.outbound.plugins
#          (after token-exchange, since IBAC needs to see the bearer
#           token already set so judge calls have valid auth context;
#           after mcp-parser so MCP tool calls are enriched)
#   4. kubectl-applies the merged config back

inbound_prepend:
  - name: a2a-parser
    # No config — parser uses defaults. Required so
    # pctx.Session.LastIntent() returns the user's most recent A2A
    # message when IBAC runs on the outbound side.

outbound_append:
  - name: inference-parser
    # Surfaces the agent's outbound LLM calls (POST /v1/chat/completions
    # to ollama). Each call shows up in abctl with the model name and
    # prompt summary.
  - name: mcp-parser
    # Surfaces the agent's outbound MCP traffic (POST /mcp to the
    # ibac-email-server in this demo). Each tools/call request +
    # response shows up in abctl with the tool name (get_emails) and
    # arguments. IBAC reads pctx.Extensions.MCP for action-description
    # enrichment — its "allow/aligned" verdict on the email-fetch row
    # gets an "MCP_TOOL: get_emails" line in the show-result forensic.
  - name: ibac
    config:
      # Judge LLM. host.docker.internal:11434 works on Docker Desktop
      # / kind-with-extra-hostMappings + ollama on the host. For
      # in-cluster ollama, swap to e.g.
      # http://ollama.ollama.svc.cluster.local:11434.
      judge_endpoint: "http://host.docker.internal:11434"
      judge_model: "llama3.2:3b"
      timeout_ms: 15000

      # Don't judge the agent's own LLM-reasoning calls — the
      # `agent_llm_host` hint adds host.docker.internal to the bypass
      # list so ollama traffic skips IBAC entirely. Without this,
      # every reasoning call would burn an extra judge round-trip.
      judge_inference: false
      agent_llm_host: "host.docker.internal"

      # The IBAC demo's exfiltration scenario emits a plain HTTP
      # POST from the agent's local function-calling tool to
      # evil-server — it doesn't carry an MCP / A2A / inference
      # protocol envelope, so no parser claims it. The default
      # IBAC behavior under that condition is "passthrough"
      # (defense-in-depth — only judge what a parser claimed).
      # Set unclassified_policy: "judge" so plain-HTTP outbound
      # also reaches the judge and the demo's threat-model
      # walkthrough works end-to-end. Production deployments using
      # MCP/A2A/inference exclusively should leave this at the
      # default "passthrough" and rely on egress allowlists for
      # plain-HTTP outbound control.
      unclassified_policy: "judge"

      # Optional: override the judge's system prompt. When unset (the
      # default in this demo), the plugin uses defaultSystemPrompt
      # from authlib/plugins/ibac/judge.go — a generic
      # security-policy-judge instruction that's deliberately
      # conservative ("when in doubt, deny"). Override when the
      # default's tone or schema doesn't fit the deployment.
      #
      # The prompt MUST instruct the model to emit JSON of shape
      # {"verdict": "allow"|"deny", "reason": "..."} — anything else
      # routes through ibac.judge_uncertain (a fail-closed deny).
      #
      # Example domain-specific override:
      # system_prompt: |
      #   You are a financial-compliance reviewer. The user gave an
      #   intent; the agent is about to call a downstream API. Allow
      #   only if the action stays within the user's stated scope and
      #   does not move funds, change account ownership, or send
      #   personally identifiable data outside the firm's domain.
      #
      #   Respond with JSON only:
      #     {"verdict": "allow", "reason": "<sentence>"}
      #     or
      #     {"verdict": "deny", "reason": "<sentence>"}
