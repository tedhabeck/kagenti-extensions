# NetworkPolicies for the IBAC demo namespace.
#
# These policies layer on top of the IBAC plugin to make the demo's
# claim defensible: "IBAC is what's blocking exfiltration", not "the
# network was already isolating those flows". Without IBAC enabled
# the agent CAN reach evil-server through these policies — that's the
# baseline run that proves the attack works. With IBAC enabled the
# agent's authbridge sidecar denies the outbound BEFORE the request
# leaves the Pod, so the NetworkPolicy never enters the picture.
#
# Scope is intentionally narrow: ingress restrictions only, plus an
# egress restriction on the agent itself. The transient attacker Pod
# the Makefile spins up has no labels we can target, so default-deny
# on egress would break it.
#
# Some kind clusters (depending on the kindnet build / version) DO
# enforce NetworkPolicy; others don't. Either way the manifests are
# correct and serve as a teaching example. Production clusters with
# Calico / Cilium / antrea / etc. enforce these reliably.

# ---------- 1. default-deny INGRESS for every pod ----------
# Egress is left open so the transient attacker pod can connect in
# (it has no labels to target with an explicit egress allow). In a
# production manifest you'd flip this to Ingress+Egress and label
# every workload that needs out-of-namespace traffic explicitly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ibac-demo
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# ---------- 2. agent egress: email-server, evil-server, ollama ----------
# This IS enforced: the agent can reach exactly these three
# destinations and nothing else. So when IBAC blocks evil-server,
# the agent can't fall back to "well let me try a different
# exfil host" — the policy already constrained the blast radius.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-egress
  namespace: ibac-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ibac-agent
  policyTypes:
    - Egress
  egress:
    # email-server (poisoned content source)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ibac-email-server
      ports:
        - protocol: TCP
          port: 8888
    # evil-server (exfil target — without IBAC, this is reachable;
    # with IBAC, the request never leaves the Pod)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ibac-evil-server
      ports:
        - protocol: TCP
          port: 9999
    # ollama on the host. There is no first-class "host network"
    # selector in NetworkPolicy and host.docker.internal can resolve
    # to a different private CIDR depending on the runtime (Docker
    # Desktop's gvisor lands on 192.168.127.x; rootless podman uses
    # 10.0.x.y; etc.). The pragmatic compromise is "any IP, but only
    # on the ollama port". Agent uses this exit for both its own LLM
    # calls and IBAC's judge calls.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 11434
    # DNS — required to resolve the in-cluster service names above.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ---------- 3. agent ingress (inbound A2A) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-ingress
  namespace: ibac-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ibac-agent
  policyTypes:
    - Ingress
  ingress:
    # Anyone in the demo namespace (the transient attacker Pod the
    # Makefile spins up) can hit the agent on the authbridge reverse
    # proxy port. In a real deployment this would be locked down to
    # the ingress controller / API gateway namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ibac-demo
      ports:
        - protocol: TCP
          port: 8080

---
# ---------- 4. email-server / evil-server ingress (from agent only) ----------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: email-server-ingress
  namespace: ibac-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ibac-email-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ibac-agent
      ports:
        - protocol: TCP
          port: 8888

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: evil-server-ingress
  namespace: ibac-demo
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ibac-evil-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ibac-agent
      ports:
        - protocol: TCP
          port: 9999
