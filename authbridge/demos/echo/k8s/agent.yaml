# Echo demo agent — operator-injected, kagenti-UI-discoverable.
#
# Required labels for this agent to show up in the kagenti UI:
#   kagenti.io/type: agent           — UI lists agents by this label
#   kagenti.io/inject: enabled       — operator's webhook injects authbridge
#   kagenti.io/spire: disabled       — demo doesn't depend on SPIRE identity
#   protocol.kagenti.io/a2a: ""      — declares A2A protocol for the chat flow
#
# The operator's webhook port-steals: it sees containerPort 8000 here,
# rewrites the agent's port to 8001, and sets PORT=8001 + HTTP_PROXY so
# the agent's outbound flows through the injected authbridge sidecar's
# forward proxy on :8081. Inbound traffic from the kagenti backend
# hits the Service on :8080, which the operator points at the sidecar's
# reverse proxy on :8000, which forwards to the agent on :8001.
#
# We do NOT ship a per-agent authbridge ConfigMap here — the operator
# creates `authbridge-config-echo-agent` automatically. The demo's
# scripts/patch-echo-config.sh runs after deploy to enable credential
# placeholder swap (inbound jwt-validation placeholder_mode, outbound
# token-exchange resolve_placeholders) and register the echo-upstream
# token-exchange route.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: echo-agent
  namespace: team1

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-agent
  namespace: team1
  labels:
    app.kubernetes.io/name: echo-agent
    app.kubernetes.io/part-of: echo-demo
    # Operator's AgentCardReconciler reads these from the workload
    # (not the Pod template) to know what protocol to fetch the card
    # under and to confirm the workload is an agent.
    kagenti.io/type: agent
    protocol.kagenti.io/a2a: ""
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-agent
        app.kubernetes.io/part-of: echo-demo
        kagenti.io/type: agent
        kagenti.io/inject: enabled
        kagenti.io/spire: disabled
        protocol.kagenti.io/a2a: ""
    spec:
      serviceAccountName: echo-agent
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: echo-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PORT
              value: "8000"
            - name: UPSTREAM_URL
              value: "http://echo-upstream.team1.svc.cluster.local:8888"
            # AGENT_PUBLIC_URL is what the agent advertises in its
            # /.well-known/agent-card.json. The kagenti UI uses it
            # for the agent card; default below works for the
            # standard team1 install.
            - name: AGENT_PUBLIC_URL
              value: "http://echo-agent.team1.svc.cluster.local:8080/"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          # /shared volume mount is required by the operator-injected
          # authbridge sidecar (jwt-validation reads /shared/client-id.txt
          # written by the operator's Keycloak client-registration). The
          # agent itself doesn't read these files; the volume just has
          # to exist on the Pod for the sidecar to mount it.
          volumeMounts:
            - name: shared-data
              mountPath: /shared
      volumes:
        - name: shared-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: echo-agent
  namespace: team1
  labels:
    app.kubernetes.io/name: echo-agent
    app.kubernetes.io/part-of: echo-demo
spec:
  selector:
    app.kubernetes.io/name: echo-agent
  # Port 8080 → targetPort 8000 mirrors the github-issue-agent demo
  # shape. The kagenti backend's /chat endpoint hits the agent's
  # Service:8080, which the operator wires to the authbridge sidecar's
  # reverse proxy on :8000.
  ports:
    - port: 8080
      targetPort: 8000
      protocol: TCP
      name: http
  type: ClusterIP

---
# AgentRuntime triggers operator-managed Keycloak client registration
# (creates kagenti-keycloak-client-credentials-<hash> Secret with
# client-id.txt and client-secret.txt that the authbridge sidecar
# mounts at /shared/). Without this CR, jwt-validation has no
# audience to validate against and inbound auth falls over.
apiVersion: agent.kagenti.dev/v1alpha1
kind: AgentRuntime
metadata:
  name: echo-agent
  namespace: team1
spec:
  type: agent
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: echo-agent

# We intentionally do NOT define an AgentCard CR here — the operator
# auto-creates `<deployment>-deployment-card` for any Deployment with
# `kagenti.io/type=agent`. Defining our own collides with the
# admission webhook ("an AgentCard already targets Deployment X").
# The operator's CR points at the same Deployment, fetches our
# `/.well-known/agent-card.json` endpoint, and stuffs the result
# into the CR's status — which the kagenti UI then displays.
